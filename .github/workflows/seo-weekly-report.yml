name: SEO Weekly Report

# Runs every Monday at 08:00 UTC — generates keyword + competitor + content brief
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      domain:
        description: 'Target domain (default: thegoodguys.com.au)'
        required: false
        default: 'thegoodguys.com.au'
      topics:
        description: 'Comma-separated keyword topics to research'
        required: false
        default: 'TVs, washing machines, fridges, air conditioners, vacuum cleaners'
      competitors:
        description: 'Comma-separated competitor domains'
        required: false
        default: 'jbhifi.com.au,harveynorman.com.au,officeworks.com.au'

jobs:
  seo-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"

    steps:
      # ── API key guard ──────────────────────────────────────────────────────
      - name: Check API key
        id: check
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: echo "has_key=$HAS_KEY" >> "$GITHUB_OUTPUT"

      - name: Skip — API key not configured
        if: steps.check.outputs.has_key == 'false'
        run: |
          echo "::warning::ANTHROPIC_API_KEY secret is not configured. Skipping weekly report."
          echo "Add the secret under Settings → Secrets and variables → Actions."

      # ── Main workflow (only runs when API key is present) ──────────────────
      - uses: actions/checkout@v4
        if: steps.check.outputs.has_key == 'true'

      - uses: astral-sh/setup-uv@v4
        if: steps.check.outputs.has_key == 'true'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.has_key == 'true'
        run: uv sync --frozen

      - name: Build prompt
        if: steps.check.outputs.has_key == 'true'
        id: prompt
        run: |
          DOMAIN="${{ github.event.inputs.domain || 'thegoodguys.com.au' }}"
          TOPICS="${{ github.event.inputs.topics || 'TVs, washing machines, fridges, air conditioners, vacuum cleaners' }}"
          COMPETITORS="${{ github.event.inputs.competitors || 'jbhifi.com.au,harveynorman.com.au,officeworks.com.au' }}"
          DATE=$(date +%Y-%m-%d)

          cat >> $GITHUB_OUTPUT << EOF
          prompt<<PROMPT_EOF
          Use the seo-team-lead to run the full weekly SEO workflow for ${DOMAIN} on ${DATE}.

          Topics: ${TOPICS}
          Competitors: ${COMPETITORS}
          Database: au

          The team lead should:
          1. Delegate keyword research to seo-keyword-researcher (Haiku)
          2. Delegate competitor analysis to seo-competitor-analyst (Haiku) vs ${COMPETITORS}
          3. Delegate content audit to seo-content-auditor (Haiku) for files in seo/
          4. Delegate final report to seo-reporter (Sonnet) — write to seo/outputs/report-${DATE}.md
          5. Open a GitHub issue titled "SEO Weekly Report ${DATE}" with executive summary + top 5 actions checklist

          Use ctx_index to pass large data between agents. Do NOT include "@claude" in any issue or comment text.
          PROMPT_EOF
          EOF

      - uses: anthropics/claude-code-action@v1
        if: steps.check.outputs.has_key == 'true'
        env:
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
          CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          max_turns: "30"
          mcp_config: .claude/mcp-actions.json
          allowed_tools: "Agent,Read,Write,Glob,Grep,Bash,mcp__context-mode__ctx_read_file,mcp__context-mode__ctx_index,mcp__context-mode__ctx_search,mcp__context-mode__ctx_list,mcp__context-mode__ctx_drop,mcp__Semrush_MCP_server__keyword_research,mcp__Semrush_MCP_server__organic_research,mcp__Semrush_MCP_server__backlink_research,mcp__Semrush_MCP_server__overview_research,mcp__Semrush_MCP_server__url_research,mcp__Semrush_MCP_server__execute_report,mcp__Semrush_MCP_server__get_report_schema"
          append_system_prompt: |
            You are running a scheduled SEO report in GitHub Actions CI. Route everything through seo-team-lead.
            Use context-mode MCP to pass large datasets between agents efficiently.
            Write all output files to seo/outputs/ before creating the GitHub issue.
            Do NOT include "@claude" anywhere in generated content.
          prompt: ${{ steps.prompt.outputs.prompt }}

      - name: Upload SEO outputs as artifact
        if: steps.check.outputs.has_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: seo-outputs-${{ github.run_id }}
          path: seo/outputs/
          retention-days: 90
