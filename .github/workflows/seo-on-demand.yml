name: SEO On-Demand (@claude)

# Responds to @claude mentions in issues and PR comments.
# Also supports direct workflow_dispatch for scripted tasks.
# Requires ANTHROPIC_API_KEY secret — posts a friendly notice and exits
# cleanly (green) if the secret is not configured.
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      task:
        description: 'SEO task to run (free text prompt)'
        required: true
        type: string

jobs:
  seo-on-demand:
    # Guard: skip bot/app comments to prevent infinite loops
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.user.type != 'Bot' &&
        github.event.comment.user.login != 'github-actions[bot]'
      ) ||
      (
        github.event_name == 'issues' &&
        contains(github.event.issue.body, '@claude') &&
        github.event.issue.user.type != 'Bot'
      )

    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    env:
      CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"

    steps:
      # ── API key guard ──────────────────────────────────────────────────────
      # If ANTHROPIC_API_KEY is not configured the remaining steps are skipped
      # and a helpful comment is posted. The job exits green (not red).
      - name: Check API key
        id: check
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: echo "has_key=$HAS_KEY" >> "$GITHUB_OUTPUT"

      - name: Notify — API key not configured
        if: steps.check.outputs.has_key == 'false' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '**Claude Code is not yet connected.** ⚙️',
                '',
                'The `ANTHROPIC_API_KEY` secret is not configured for this repository.',
                'Add it under **Settings → Secrets and variables → Actions** to enable on-demand SEO tasks.',
                '',
                '_— GitHub Actions_'
              ].join('\n')
            });

      # ── Main workflow (only runs when API key is present) ──────────────────
      - uses: actions/checkout@v4
        if: steps.check.outputs.has_key == 'true'

      # context-mode MCP requires uv + Python
      - uses: astral-sh/setup-uv@v4
        if: steps.check.outputs.has_key == 'true'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check.outputs.has_key == 'true'
        run: uv sync --frozen

      # Build prompt for all event types safely using toJson() to avoid shell injection
      - name: Build prompt
        if: steps.check.outputs.has_key == 'true'
        id: prompt
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            BODY=$(echo '${{ toJson(github.event.inputs.task) }}' | python3 -c "import sys,json;print(json.load(sys.stdin))")
          elif [ "$EVENT" = "issue_comment" ]; then
            BODY=$(echo '${{ toJson(github.event.comment.body) }}' | python3 -c "import sys,json;print(json.load(sys.stdin))")
          else
            BODY=$(echo '${{ toJson(github.event.issue.body) }}' | python3 -c "import sys,json;print(json.load(sys.stdin))")
          fi
          BODY=$(echo "$BODY" | sed 's/@claude//gI')
          {
            printf 'prompt<<PROMPT_EOF\n'
            printf '%s\n' "$BODY"
            printf 'PROMPT_EOF\n'
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        if: steps.check.outputs.has_key == 'true'
        env:
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
          CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          max_turns: "20"
          mcp_config: .claude/mcp-actions.json
          allowed_tools: "Agent,Read,Write,Glob,Grep,Bash,mcp__context-mode__ctx_read_file,mcp__context-mode__ctx_index,mcp__context-mode__ctx_search,mcp__context-mode__ctx_list,mcp__context-mode__ctx_drop,mcp__Semrush_MCP_server__keyword_research,mcp__Semrush_MCP_server__organic_research,mcp__Semrush_MCP_server__backlink_research,mcp__Semrush_MCP_server__overview_research,mcp__Semrush_MCP_server__url_research,mcp__Semrush_MCP_server__execute_report,mcp__Semrush_MCP_server__get_report_schema"
          append_system_prompt: |
            You are the SEO team lead for thegoodguys.com.au running in GitHub Actions CI.

            ALWAYS route tasks through the seo-team-lead subagent — do not do SEO work directly in this conversation.
            Use context-mode MCP (ctx_index / ctx_search) to pass large data between agents efficiently.
            Save all outputs to seo/outputs/ before posting your reply.
            Post a clear summary comment when done, but do NOT include the text "@claude" anywhere in your comment.

            Target: thegoodguys.com.au | Competitors: jbhifi.com.au, harveynorman.com.au, officeworks.com.au | Database: au
          prompt: ${{ steps.prompt.outputs.prompt }}

      - name: Upload outputs
        if: steps.check.outputs.has_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: seo-on-demand-${{ github.run_id }}
          path: seo/outputs/
          retention-days: 30
