name: AEO Audit

# ─────────────────────────────────────────────────────────────────────────────
# AEO (Agentic Engine Optimisation) audit for TGG + competitors.
#
# AEO CRAWL — Per-URL signal audit (~5-8 min, no browser needed)
#   Pure Python (httpx + BeautifulSoup). Screaming Frog-style: one row per URL,
#   one column per check (robots_ai, llms_txt, meta_tags, headings, schema, content, JS).
#   Covers TGG + 3 competitors across all page types.
#
# PLAYWRIGHT SNAPSHOTS — Rendered HTML capture (~10-15 min)
#   Headless Chromium renders TGG pages and saves HTML. Required for:
#   - JS dependency check (run_aeo_crawl.py js_depend column)
#   - Phase 3 render diff
#   - Phase 4 content intelligence
#
# PHASE 3 — Ecommerce technical AEO (~10 min, requires snapshots)
#   Schema/structured data, render diff, user agent behaviour, hidden content,
#   AI content signals, robots+llms, sitemap, competitor schema.
#
# PHASE 4 — Content intelligence (~5 min, requires snapshots)
#   Entity signals, content chunking, semantic structure, LLM quality.
#
# No API keys required. All inputs have sensible defaults.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:

      # ── Core phases ──────────────────────────────────────────────────────────
      run_crawl:
        description: |
          ☑ AEO Crawl — per-URL signal audit (~5-8 min)
          Pure Python: robots_ai, llms_txt, meta_tags, headings, schema, content, JS.
          Covers TGG + JB Hi-Fi + Harvey Norman + Appliances Online.
          No browser needed — fast competitor diff on any CI runner.
        type: boolean
        default: true

      run_snapshots:
        description: |
          ☑ Playwright snapshots (~10-15 min)
          Renders TGG pages with headless Chromium and saves HTML.
          Required for JS dependency scores, Phase 3 render diff, and Phase 4.
          Skip for a fast crawl-only run.
        type: boolean
        default: true

      run_phase3:
        description: |
          ☑ PHASE 3 — Ecommerce AEO checks (~10 min, requires snapshots)
          Schema/structured data: Product, FAQ, BreadcrumbList, AggregateRating
          Render diff: httpx raw vs Playwright snapshot (what bots see vs browsers)
          User agent behaviour: ClaudeBot, GPTBot, PerplexityBot vs 200/403
          Hidden content: display:none / aria-hidden / collapsed accordions
          AI content signals: FAQ blocks, comparison tables, direct answers
        type: boolean
        default: true

      run_phase4:
        description: |
          ☑ PHASE 4 — Content intelligence (~5 min, requires snapshots)
          Entity signals, content chunking, semantic structure, anchor quality.
          Requires Playwright snapshots — run with run_snapshots: true.
        type: boolean
        default: true

      crawl_mode:
        description: |
          URL source for AEO Crawl:
          ● List mode — TGG + competitors  (default)  Home / Category / Product / Guide / Blog for TGG + JB Hi-Fi + Harvey Norman + Appliances Online
          ● List mode — TGG only           Fast run, ~5 URLs, no competitor comparison
          ● Custom URLs                    Use the crawl_urls field below — one URL per line
        type: choice
        options:
          - "List mode — TGG + competitors"
          - "List mode — TGG only"
          - "Custom URLs"
        default: "List mode — TGG + competitors"

      # ── Custom URL overrides ─────────────────────────────────────────────────
      crawl_urls:
        description: |
          URLs to audit in Custom URLs mode — one URL per line.
          Each line: just a URL, or "URL Label" with a space-separated label.
          Only used when crawl_mode is "Custom URLs" — ignored otherwise.
        required: false
        default: ''

      snapshot_urls:
        description: |
          Custom Playwright snapshot URLs (optional — leave blank for defaults).
          JSON array of TGG URLs. Defaults: home, 3× category, sub-category,
          product, 3× buying guide, news, sale.
        required: false
        default: ''

      live_urls:
        description: |
          Phase 3 live URLs for user-agent and render-diff checks (optional).
          JSON array of TGG URLs to test live. Defaults: TGG home + 2 categories.
          Keep to 3-5 URLs — each URL is tested with multiple bot User-Agents.
        required: false
        default: ''

      # ── Sitemap crawl (optional) ─────────────────────────────────────────────
      run_sitemap_crawl:
        description: |
          ☐ Sitemap crawl mode (optional) — crawl via sitemap instead of fixed URLs.
          Fetches sitemap_index.xml, classifies URLs by type, samples N per type.
          Set sitemap_domain and sitemap_sample to configure.
        type: boolean
        default: false

      sitemap_domain:
        description: 'Domain to crawl in sitemap mode (default: thegoodguys.com.au)'
        required: false
        default: 'thegoodguys.com.au'

      sitemap_sample:
        description: 'URLs to sample per page type in sitemap mode (default: 5)'
        required: false
        default: '5'

      sitemap_types:
        description: 'Page types to crawl in sitemap mode (default: home,category,product,guide,blog)'
        required: false
        default: 'home,category,product,guide,blog'

      # ── Optional extras ──────────────────────────────────────────────────────
      gmc_feed_url:
        description: |
          GMC feed URL (optional) — enables GMC Feed Completeness check in Phase 3.
          Example: https://www.thegoodguys.com.au/feed.xml
          Leave blank to skip (check will appear as ⏭ Skipped in report).
        required: false
        default: ''

      run_agent_tests:
        description: |
          ☐ Agent commerce tests (~2 min) — probe MCP/ACP/UCP endpoints as an AI agent.
          Runs test_agent_commerce.py against the target domain.
          Safe read-only probes only — no purchases made.
        type: boolean
        default: false

      rebuild_corpus:
        description: |
          ☐ Force rebuild competitor corpus
          Normally the corpus is auto-built on first Phase 4 run and cached.
          Tick to wipe the cache and rebuild from scratch (~5 min extra).
        type: boolean
        default: false

  # Uncomment to run weekly (Sunday 22:00 UTC = Monday 08:00 AEST):
  # schedule:
  #   - cron: '0 22 * * 0'

jobs:
  aeo-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # ── Cache HuggingFace + Qdrant so heavy deps don't re-run every workflow ─
      - name: Cache HuggingFace + torch models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-models-bge-m3-spacy-v3
          restore-keys: hf-models-

      - name: Cache Qdrant competitor corpus
        if: inputs.run_phase4
        uses: actions/cache@v4
        with:
          path: qdrant_data
          key: qdrant-corpus-${{ github.run_number }}
          restore-keys: qdrant-corpus-

      - name: Install Python deps
        run: |
          pip install httpx playwright beautifulsoup4 lxml pyyaml \
            sentence-transformers FlagEmbedding qdrant-client \
            spacy textstat
          python -m spacy download en_core_web_sm

      - name: Install Playwright browser
        if: inputs.run_snapshots || inputs.run_phase3 || inputs.run_phase4
        run: playwright install chromium --with-deps

      # ── AEO Crawl — per-URL signal audit ────────────────────────────────────
      - name: "AEO Crawl — Per-URL signal audit (~5-8 min)"
        if: inputs.run_crawl
        continue-on-error: true
        env:
          AEO_LABEL: tgg
          AEO_URLS: ${{ inputs.crawl_mode == 'Custom URLs' && inputs.crawl_urls || '' }}
          AEO_NO_COMPETITORS: ${{ inputs.crawl_mode == 'List mode — TGG only' && 'true' || 'false' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_aeo_crawl.py 2>&1

      - name: "AEO Crawl — Results"
        if: inputs.run_crawl && always()
        run: |
          if ls seo/outputs/aeo/crawl-*.json 1>/dev/null 2>&1; then
            python3 - <<'EOF'
          import json, glob
          files = sorted(glob.glob('seo/outputs/aeo/crawl-*.json'))
          results = json.loads(open(files[-1]).read())
          g = {'A':'🟢','B':'🟢','C':'🟡','D':'🟠','F':'🔴'}

          def grade(pct):
              return 'A' if pct>=80 else 'B' if pct>=65 else 'C' if pct>=50 else 'D' if pct>=35 else 'F'

          by_domain = {}
          for r in results:
              by_domain.setdefault(r['domain'], []).append(r)

          for domain, pages in sorted(by_domain.items()):
              avg = round(sum(p['percentage'] for p in pages) / len(pages))
              gr = grade(avg)
              print(f'\n  {g.get(gr,"?")} {domain:<40} avg {avg}% (Grade {gr})  [{len(pages)} pages]')
              for p in pages:
                  pg = p.get('grade','?')
                  issues = len(p.get('issues',[]))
                  checks = p.get('checks',{})
                  sb = '✅' if (checks.get('schema_type',{}).get('score',0) or 0) >= 15 else '⚠️' if (checks.get('schema_type',{}).get('score',0) or 0) >= 5 else '❌'
                  rb = '✅' if (checks.get('robots_ai',{}).get('score',0) or 0) >= 25 else '⚠️' if (checks.get('robots_ai',{}).get('score',0) or 0) >= 15 else '❌'
                  print(f'    {g.get(pg,"?")} {pg} ({p["percentage"]:>3}%) | robots:{rb} schema:{sb} | {p["label"]} — {issues} issue(s)')
          EOF
          fi

      # ── Playwright snapshot crawl ────────────────────────────────────────────
      - name: "Playwright snapshots — Render TGG pages (~10-15 min)"
        if: inputs.run_snapshots
        continue-on-error: true
        env:
          CRAWL_URLS: ${{ inputs.snapshot_urls }}
        run: |
          if [ -n "$CRAWL_URLS" ]; then
            python crawl_site_snapshot.py --urls "$CRAWL_URLS" 2>&1
          else
            python crawl_site_snapshot.py --urls '[
              "https://www.thegoodguys.com.au",
              "https://www.thegoodguys.com.au/televisions",
              "https://www.thegoodguys.com.au/air-conditioners",
              "https://www.thegoodguys.com.au/washing-machines",
              "https://www.thegoodguys.com.au/televisions/all-tvs/smart-tvs",
              "https://www.thegoodguys.com.au/laptops-computers",
              "https://www.thegoodguys.com.au/samsung-65-4k-qled-smart-tv-qa65qn90dauxsa",
              "https://www.thegoodguys.com.au/buying-guide/best-tvs",
              "https://www.thegoodguys.com.au/buying-guide/best-air-conditioners",
              "https://www.thegoodguys.com.au/buying-guide/best-washing-machines",
              "https://www.thegoodguys.com.au/whats-new",
              "https://www.thegoodguys.com.au/sale"
            ]' 2>&1
          fi

      # ── Sitemap crawl (optional) ─────────────────────────────────────────────
      - name: "Sitemap crawl (optional)"
        if: inputs.run_sitemap_crawl
        continue-on-error: true
        run: |
          python crawl_from_sitemap.py \
            --domain "${{ inputs.sitemap_domain }}" \
            --sample "${{ inputs.sitemap_sample }}" \
            --types "${{ inputs.sitemap_types }}" 2>&1

      # ── Auto-build competitor corpus if Qdrant is empty ──────────────────────
      - name: "Phase 4 prep — Build competitor corpus if missing or forced"
        if: inputs.run_phase4
        continue-on-error: true
        run: |
          if [ "${{ inputs.rebuild_corpus }}" = "true" ]; then
            echo "Force rebuild requested — wiping qdrant_data and rebuilding"
            rm -rf qdrant_data
          fi
          if [ -d "qdrant_data" ] && [ "$(ls -A qdrant_data 2>/dev/null)" ]; then
            echo "Qdrant corpus exists (cache hit) — skipping rebuild"
          else
            echo "Qdrant corpus missing — building from competitor pages..."
            python build_competitor_corpus.py 2>&1 || echo "Corpus build failed — Phase 4 will use empty corpus"
          fi

      # ── Phase 3: Ecommerce-specific AEO checks ──────────────────────────────
      - name: "Phase 3 — Ecommerce AEO checks (~10 min)"
        if: inputs.run_phase3
        continue-on-error: true
        env:
          SNAPSHOT_DIR: site-snapshots/thegoodguys.com.au
          AEO_LABEL: TGG (ecommerce)
          LIVE_URLS: >-
            ${{ inputs.live_urls != '' && inputs.live_urls ||
              '["https://www.thegoodguys.com.au",
                "https://www.thegoodguys.com.au/televisions",
                "https://www.thegoodguys.com.au/televisions/all-tvs/smart-tvs",
                "https://www.thegoodguys.com.au/buying-guide/best-tvs"]' }}
          GMC_FEED_URL: ${{ inputs.gmc_feed_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_ecommerce_aeo.py 2>&1

      - name: "Phase 3 — Results"
        if: inputs.run_phase3 && always()
        run: |
          if ls seo/outputs/aeo/ecommerce-aeo-*.json 1>/dev/null 2>&1; then
            python3 - <<'EOF'
          import json, glob
          files = sorted(glob.glob('seo/outputs/aeo/ecommerce-aeo-*.json'))
          data = json.loads(open(files[-1]).read())
          g = {'A':'🟢','B':'🟢','C':'🟡','D':'🟠','F':'🔴'}
          grade = data.get('grade','?')
          pct = data.get('percentage',0)
          print(f"Ecommerce AEO: {g.get(grade,'?')} Grade {grade} ({pct}%)")
          check_names = {
              'schema':            'Schema / Structured Data',
              'schema_validity':   'Schema Validity',
              'render_diff':       'Render Diff',
              'user_agents':       'User Agent Behaviour',
              'hidden_content':    'Hidden Content',
              'ai_signals':        'AI Content Signals',
              'dom_structure':     'DOM Structure',
              'robots_content':    'Robots.txt & llms.txt',
              'sitemap_coverage':  'Sitemap Coverage',
              'competitor_schema': 'Competitor Schema',
              'au_signals':        'AU Content Signals',
              'agentic_commerce':  'Agentic Commerce Readiness',
              'gtin_coverage':     'GTIN Coverage',
              'gmc_feed':          'GMC Feed Completeness',
              'content_freshness': 'Content Freshness',
              'review_accessibility': 'Review Accessibility',
          }
          for key, name in check_names.items():
              c = data.get('checks', {}).get(key, {})
              if not c:
                  continue
              if 'error' in c:
                  print(f"  ✗ {name:<28} {c['error'][:50]}")
              else:
                  bar = '█' * round(c.get('percentage',0)/5) + '░' * (20-round(c.get('percentage',0)/5))
                  print(f"  {name:<28} {bar} {c.get('score',0)}/{c.get('maxScore',0)} ({c.get('percentage',0)}%)")
          EOF
          fi

      # ── Phase 3b: Generate recommendations ──────────────────────────────────
      - name: "Phase 3b — Generate recommendations"
        if: inputs.run_phase3 && always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_recommendations.py 2>&1

      # ── Agent Commerce Test (optional) ───────────────────────────────────────
      - name: "Agent commerce smoke test (~2 min)"
        if: inputs.run_agent_tests
        continue-on-error: true
        run: python test_agent_commerce.py --domain thegoodguys.com.au 2>&1

      # ── Phase 4: Content Intelligence ───────────────────────────────────────
      - name: "Phase 4 — Content intelligence (~5 min)"
        if: inputs.run_phase4
        continue-on-error: true
        env:
          SNAPSHOT_DIR: site-snapshots/thegoodguys.com.au
          AEO_LABEL: TGG (content intelligence)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_content_aeo.py 2>&1

      - name: "Phase 4 — Results"
        if: inputs.run_phase4 && always()
        run: |
          if ls seo/outputs/aeo/content-aeo-*.json 1>/dev/null 2>&1; then
            python3 - <<'EOF'
          import json, glob
          files = sorted(glob.glob('seo/outputs/aeo/content-aeo-*.json'))
          data = json.loads(open(files[-1]).read())
          g = {'A':'🟢','B':'🟢','C':'🟡','D':'🟠','F':'🔴'}
          grade = data.get('grade','?')
          print(f"Content AEO: {g.get(grade,'?')} Grade {grade} ({data.get('percentage',0)}%)")
          for key, name in [
              ('boilerplate_ratio',  'Boilerplate Ratio'),
              ('content_chunking',   'Content Chunking'),
              ('entity_signals',     'Entity Signals'),
              ('knowledge_graph',    'Knowledge Graph'),
              ('semantic_structure', 'Semantic Structure'),
              ('anchor_quality',     'Anchor Text Quality'),
              ('content_similarity', 'Content Similarity'),
              ('entity_gap',         'Entity Gap vs Competitors'),
              ('llm_quality',        'LLM Quality Judge'),
          ]:
              c = data.get('checks', {}).get(key, {})
              if not c:
                  continue
              if 'error' in c:
                  print(f"  ✗ {name:<25} {c['error'][:50]}")
              elif c.get('skipped'):
                  print(f"  ⏭ {name:<25} skipped (self-hosted runner required)")
              else:
                  bar = '█' * round(c.get('percentage',0)/5) + '░' * (20-round(c.get('percentage',0)/5))
                  print(f"  {name:<25} {bar} {c.get('score',0)}/{c.get('maxScore',0)} ({c.get('percentage',0)}%)")
          EOF
          fi

      # ── Report ───────────────────────────────────────────────────────────────
      - name: "Generate HTML report"
        if: always()
        continue-on-error: true
        env:
          AEO_OUTPUT_DIR: seo/outputs/aeo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_aeo_report.py 2>&1

      # ── Deploy to GitHub Pages ────────────────────────────────────────────────
      - name: "Deploy report to GitHub Pages"
        if: always()
        continue-on-error: true
        run: |
          if [ ! -f seo/outputs/aeo/report-latest.html ]; then
            echo "No report-latest.html — skipping Pages deploy"
            exit 0
          fi
          cp seo/outputs/aeo/report-latest.html /tmp/aeo-report.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout -- . 2>/dev/null || true
          git clean -fd seo/outputs/aeo/ 2>/dev/null || true
          git checkout gh-pages
          mkdir -p aeo
          cp /tmp/aeo-report.html aeo/index.html
          git add aeo/index.html
          git diff --staged --quiet || git commit -m "Deploy AEO report — run #${{ github.run_number }}"
          git push origin gh-pages
          git checkout -
          echo "Report live at: https://simonmannheimer-tgg.github.io/Claude/aeo/"

      # ── Artifacts ─────────────────────────────────────────────────────────────
      - name: Upload AEO results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aeo-results-${{ github.run_id }}
          path: seo/outputs/aeo/
          retention-days: 90
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload site snapshots
        if: inputs.run_snapshots && always()
        uses: actions/upload-artifact@v4
        with:
          name: site-snapshots-${{ github.run_id }}
          path: site-snapshots/
          retention-days: 7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
