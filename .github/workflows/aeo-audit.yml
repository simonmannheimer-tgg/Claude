name: AEO Audit

# Two-phase audit for Agentic Engine Optimisation (AEO) readiness.
#
# Phase 1 — URL comparison (no crawl needed):
#   Runs agentic-seo in URL mode against TGG + competitors.
#   Checks: robots.txt AI rules, llms.txt, agent-permissions.json.
#
# Phase 2 — Local deep scan (Playwright crawl → full 10-check audit):
#   Uses Playwright/Chromium to download rendered HTML from TGG pages,
#   then runs agentic-seo in directory mode for the full score including
#   content-structure, token-budget, meta-tags, copy-for-ai, markdown-availability.
#
# No API keys required.

on:
  workflow_dispatch:
    inputs:
      urls:
        description: >
          Phase 1: JSON array of URLs for competitor comparison.
          Each item can be a string or {"url": "...", "label": "..."}.
          Leave blank for default set: TGG Home, TGG TVs, TGG Air Con,
          JB Hi-Fi, Harvey Norman.
        required: false
        default: ''
      crawl_urls:
        description: >
          Phase 2: JSON array of TGG URLs to crawl for local deep scan.
          Leave blank for default 10-page TGG set.
        required: false
        default: ''
      checks:
        description: 'Phase 1 only: comma-separated checker IDs (blank = all 10)'
        required: false
        default: ''
      skip_crawl:
        description: 'Set to "true" to skip Phase 2 (URL comparison only)'
        required: false
        default: 'false'

  # Uncomment to run weekly (Sunday 22:00 UTC = Monday 08:00 AEST):
  # schedule:
  #   - cron: '0 22 * * 0'

jobs:
  aeo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install agentic-seo
        run: npm install -g agentic-seo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Python deps
        run: pip install httpx playwright

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      # ── Phase 1: URL comparison ───────────────────────────────────────────

      - name: Phase 1 — URL comparison audit
        continue-on-error: true
        env:
          AEO_URLS: ${{ inputs.urls }}
          AEO_CHECKS: ${{ inputs.checks }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_aeo_audit.py 2>&1

      - name: Phase 1 — Show results
        if: always()
        run: |
          if ls seo/outputs/aeo/aeo-results-*.json 1>/dev/null 2>&1; then
            python3 - <<'EOF'
          import json, glob, sys
          files = sorted(glob.glob('seo/outputs/aeo/aeo-results-*.json'))
          entries = json.loads(open(files[-1]).read())
          grade_map = {'A': '🟢', 'B': '🟢', 'C': '🟡', 'D': '🟠', 'F': '🔴'}
          for e in entries:
              r = e.get('result', {})
              label = e.get('label', e.get('url', '?'))
              if 'error' in r:
                  print(f'  ✗ {label}: {r["error"][:100]}')
              else:
                  g = r.get('grade', '?')
                  pct = r.get('percentage', 0)
                  s = r.get('summary', {})
                  print(f'  {grade_map.get(g,"?")} {g} ({pct}%) | {label} | {s.get("errors","?")} errors, {s.get("warnings","?")} warnings')
          EOF
          fi

      # ── Phase 2: Playwright crawl + local deep scan ───────────────────────

      - name: Phase 2 — Crawl TGG pages
        if: ${{ inputs.skip_crawl != 'true' }}
        continue-on-error: true
        env:
          CRAWL_URLS: ${{ inputs.crawl_urls }}
        run: |
          if [ -n "$CRAWL_URLS" ]; then
            python crawl_site_snapshot.py --urls "$CRAWL_URLS" 2>&1
          else
            python crawl_site_snapshot.py 2>&1
          fi

      - name: Phase 2 — Local deep scan
        if: ${{ inputs.skip_crawl != 'true' }}
        continue-on-error: true
        env:
          AEO_DIR: site-snapshots/thegoodguys.com.au
          AEO_LABEL: TGG (local deep scan)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_aeo_local.py 2>&1

      - name: Phase 2 — Show local results
        if: ${{ inputs.skip_crawl != 'true' && always() }}
        run: |
          if ls seo/outputs/aeo/aeo-local-*.json 1>/dev/null 2>&1; then
            python3 - <<'EOF'
          import json, glob
          files = sorted(glob.glob('seo/outputs/aeo/aeo-local-*.json'))
          data = json.loads(open(files[-1]).read())
          r = data.get('report', {})
          cats = r.get('categories', {})
          print(f"Local deep scan: Grade {r.get('grade','?')} ({r.get('percentage',0)}%)")
          for k, c in cats.items():
              bar = '█' * round(c['percentage']/5) + '░' * (20 - round(c['percentage']/5))
              print(f"  {c['name']:<22} {bar} {c['score']}/{c['maxScore']} ({c['percentage']}%)")
          EOF
          fi

      # ── Artifacts ─────────────────────────────────────────────────────────

      - name: Upload AEO results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aeo-results-${{ github.run_id }}
          path: seo/outputs/aeo/
          retention-days: 90
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload site snapshots
        if: ${{ inputs.skip_crawl != 'true' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: site-snapshots-${{ github.run_id }}
          path: site-snapshots/
          retention-days: 7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
