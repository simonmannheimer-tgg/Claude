name: AEO Audit

# ─────────────────────────────────────────────────────────────────────────────
# Two-phase AEO (Agentic Engine Optimisation) audit for TGG + competitors.
#
# PHASE 1 — URL comparison (~5 min, no browser needed)
#   Fetches robots.txt, llms.txt, agent-permissions.json via HTTP.
#   Runs against TGG + Harvey Norman, JB Hi-Fi, Appliances Online by default.
#
# PHASE 2 — Deep local scan (~20-25 min, Playwright required)
#   Launches headless Chromium, renders 10 TGG pages across all content types,
#   saves HTML, then runs agentic-seo in directory mode for the full 10-check
#   score (content structure, token budget, meta tags, copy-for-AI, markdown).
#
# No API keys required. All inputs have sensible defaults — leave blank to run
# a full default audit.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:

      # ── Phases ──────────────────────────────────────────────────────────────
      run_phase1:
        description: |
          ☑ PHASE 1 — URL comparison (~5 min)
          Checks robots.txt AI rules, llms.txt, agent-permissions.json across
          TGG + competitors. No Playwright needed. Good for quick competitor diff.
        type: boolean
        default: true

      run_phase2:
        description: |
          ☑ PHASE 2 — Deep local scan (~20-25 min)
          Playwright crawls TGG pages, saves rendered HTML, runs full 10-check
          audit. Unlocks: content structure, token budget, meta tags, copy-for-AI,
          markdown availability. Results include per-category scores and fixes.
        type: boolean
        default: true

      run_phase3:
        description: |
          ☑ PHASE 3 — Ecommerce AEO checks (~10 min, requires Phase 2 snapshots)
          Schema/structured data: Product, FAQ, BreadcrumbList, AggregateRating
          Render diff: httpx raw vs Playwright snapshot (what bots see vs browsers)
          User agent behaviour: ClaudeBot, GPTBot, PerplexityBot vs 200/403
          Hidden content: display:none / aria-hidden / collapsed accordions
          AI content signals: FAQ blocks, comparison tables, direct answers
        type: boolean
        default: true

      # ── Check groups (apply to both phases where relevant) ──────────────────
      check_discovery:
        description: |
          ☑ Discovery — 25 pts  (~1 min)
          robots.txt AI crawler rules (ClaudeBot, GPTBot, PerplexityBot, Google-Extended)
          llms.txt presence, structure, token counts, section headings
          AGENTS.md / CLAUDE.md (repo instruction files for AI coding agents)
        type: boolean
        default: true

      check_content:
        description: |
          ☑ Content Structure — 25 pts  (~3-5 min, Phase 2 only)
          Heading hierarchy (H1→H2→H3, no skips), semantic HTML (main/article/section)
          Markdown availability alongside HTML, HTML-to-text noise ratio
          JavaScript-required rendering detection (SPA/React indicator)
        type: boolean
        default: true

      check_tokens:
        description: |
          ☑ Token Economics — 25 pts  (~2-3 min, Phase 2 only)
          Per-page token counts (target: avg <25K, none >50K)
          AI-friendly meta tags: description, og:type, title, canonical
          ai:token-count meta tag presence
        type: boolean
        default: true

      check_capability:
        description: |
          ☑ Capability Signalling — 15 pts  (<1 min)
          skill.md capability description files (relevant for API/service pages)
          agent-permissions.json / .well-known/ai-plugin.json
          Note: skill.md is designed for SaaS/API docs — low-impact for retail.
        type: boolean
        default: true

      check_ux:
        description: |
          ☑ UX Bridge — 10 pts  (~1 min, Phase 2 only)
          "Copy for AI" / "Copy as Markdown" buttons
          Copy-to-clipboard on code/content blocks
          Raw view / "View source" / "Edit on GitHub" links
        type: boolean
        default: true

      # ── Custom URL overrides ─────────────────────────────────────────────────
      urls:
        description: |
          Phase 1 custom URLs (optional — leave blank for defaults).
          JSON array of strings or {"url":"...","label":"..."} objects.
          Defaults: TGG Home + Harvey Norman + JB Hi-Fi + Appliances Online
        required: false
        default: ''

      crawl_urls:
        description: |
          Phase 2 custom crawl URLs (optional — leave blank for defaults).
          JSON array of TGG URLs. Defaults cover: home, 3× category, sub-category,
          product, 2× buying guide, blog/news, sale page.
          Tip: use 3-5 URLs for a quick test run (~10-12 min).
        required: false
        default: ''

      live_urls:
        description: |
          Phase 3 live URLs for user-agent and render-diff checks (optional).
          JSON array of TGG URLs to test live. Defaults: TGG home + 2 categories.
          Keep to 3-5 URLs — each URL is tested with 5 different bot User-Agents.
        required: false
        default: ''

      run_sitemap_crawl:
        description: |
          ☐ Sitemap crawl mode (optional) — crawl via sitemap instead of fixed URLs.
          Fetches sitemap_index.xml, classifies URLs by type, samples N per type.
          Set sitemap_domain and sitemap_sample to configure.
        type: boolean
        default: false

      sitemap_domain:
        description: Domain to crawl in sitemap mode (default: thegoodguys.com.au)
        required: false
        default: 'thegoodguys.com.au'

      sitemap_sample:
        description: URLs to sample per page type in sitemap mode (default: 5)
        required: false
        default: '5'

      sitemap_types:
        description: Page types to crawl in sitemap mode (default: home,category,guide)
        required: false
        default: 'home,category,guide'

      rebuild_corpus:
        description: |
          ☐ Rebuild competitor corpus (~20-30 min, self-hosted runner recommended)
          Crawls competitor pages, encodes with BGE-M3/MiniLM, upserts to Qdrant.
          Run monthly to keep competitor similarity scores current.
        type: boolean
        default: false

  # Uncomment to run weekly (Sunday 22:00 UTC = Monday 08:00 AEST):
  # schedule:
  #   - cron: '0 22 * * 0'

jobs:
  rebuild-corpus:
    if: github.event.inputs.rebuild_corpus == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps for corpus build
        run: pip install httpx beautifulsoup4 sentence-transformers qdrant-client
      - name: Rebuild competitor corpus
        run: python build_competitor_corpus.py 2>&1

  aeo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install agentic-seo
        run: npm install -g agentic-seo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Python deps
        run: pip install httpx playwright beautifulsoup4 lxml sentence-transformers pyyaml qdrant-client || true
        # FlagEmbedding (BGE-M3) requires ~2GB download and GPU for best speed — only on self-hosted
        # run: pip install FlagEmbedding qdrant-client  # uncomment for self-hosted runner

      - name: Install Playwright browser
        if: inputs.run_phase2 || inputs.run_phase3
        run: playwright install chromium --with-deps

      # ── Build AEO_CHECKS string from checkbox inputs ────────────────────────
      - name: Build checks filter
        id: checks
        run: |
          CHECKS=""
          add() { CHECKS="${CHECKS:+$CHECKS,}$1"; }

          [ "${{ inputs.check_discovery }}" = "true" ] && add "robots-txt,llms-txt,agents-md"
          [ "${{ inputs.check_content }}"   = "true" ] && add "content-structure,markdown-availability"
          [ "${{ inputs.check_tokens }}"    = "true" ] && add "token-budget,meta-tags"
          [ "${{ inputs.check_capability }}" = "true" ] && add "skill-md,agent-permissions"
          [ "${{ inputs.check_ux }}"        = "true" ] && add "copy-for-ai"

          echo "value=$CHECKS" >> "$GITHUB_OUTPUT"
          echo "Active checks: ${CHECKS:-all}"

      # ── Phase 1: URL comparison ─────────────────────────────────────────────
      - name: "Phase 1 — URL comparison (~5 min)"
        if: inputs.run_phase1
        continue-on-error: true
        env:
          # Default: TGG + competitors across all page types (home, category, guide, editorial)
          AEO_URLS: >-
            ${{ inputs.urls != '' && inputs.urls ||
              '[{"url":"https://www.thegoodguys.com.au","label":"TGG · Home"},
                {"url":"https://www.thegoodguys.com.au/televisions","label":"TGG · Category"},
                {"url":"https://www.thegoodguys.com.au/buying-guide/best-tvs","label":"TGG · Guide"},
                {"url":"https://www.harveynorman.com.au","label":"Harvey Norman · Home"},
                {"url":"https://www.harveynorman.com.au/televisions","label":"Harvey Norman · Category"},
                {"url":"https://www.jbhifi.com.au","label":"JB Hi-Fi · Home"},
                {"url":"https://www.jbhifi.com.au/collections/televisions","label":"JB Hi-Fi · Category"},
                {"url":"https://www.appliancesonline.com.au","label":"Appliances Online · Home"}]' }}
          AEO_CHECKS: ${{ steps.checks.outputs.value }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_aeo_audit.py 2>&1

      - name: "Phase 1 — Results"
        if: inputs.run_phase1 && always()
        run: |
          if ls seo/outputs/aeo/aeo-results-*.json 1>/dev/null 2>&1; then
            python3 - <<'EOF'
          import json, glob
          files = sorted(glob.glob('seo/outputs/aeo/aeo-results-*.json'))
          entries = json.loads(open(files[-1]).read())
          g = {'A':'🟢','B':'🟢','C':'🟡','D':'🟠','F':'🔴'}
          for e in entries:
              r = e.get('result', {})
              lbl = e.get('label', e.get('url', '?'))
              if 'error' in r:
                  print(f'  ✗ {lbl}: {r["error"][:100]}')
              else:
                  s = r.get('summary', {})
                  print(f'  {g.get(r.get("grade","?"),"?")} {r.get("grade","?")} ({r.get("percentage",0)}%) | {lbl} | {s.get("failed",s.get("errors","?"))} errors, {s.get("warned",s.get("warnings","?"))} warns')
          EOF
          fi

      # ── Phase 2: Playwright crawl + local deep scan ─────────────────────────
      - name: "Phase 2 — Crawl TGG pages (~10-15 min)"
        if: inputs.run_phase2
        continue-on-error: true
        env:
          CRAWL_URLS: ${{ inputs.crawl_urls }}
        run: |
          if [ -n "$CRAWL_URLS" ]; then
            python crawl_site_snapshot.py --urls "$CRAWL_URLS" 2>&1
          else
            # Default: 12 pages across all content types (home, category, sub-cat,
            # product detail, buying guide ×3, editorial, sale)
            python crawl_site_snapshot.py --urls '[
              "https://www.thegoodguys.com.au",
              "https://www.thegoodguys.com.au/televisions",
              "https://www.thegoodguys.com.au/air-conditioners",
              "https://www.thegoodguys.com.au/washing-machines",
              "https://www.thegoodguys.com.au/televisions/smart-tvs",
              "https://www.thegoodguys.com.au/laptops-computers",
              "https://www.thegoodguys.com.au/samsung-65-4k-qled-smart-tv-qa65qn90dauxsa",
              "https://www.thegoodguys.com.au/buying-guide/best-tvs",
              "https://www.thegoodguys.com.au/buying-guide/best-air-conditioners",
              "https://www.thegoodguys.com.au/buying-guide/best-washing-machines",
              "https://www.thegoodguys.com.au/whats-new",
              "https://www.thegoodguys.com.au/sale"
            ]' 2>&1
          fi

      - name: "Sitemap crawl (optional)"
        if: inputs.run_sitemap_crawl
        continue-on-error: true
        run: |
          python crawl_from_sitemap.py \
            --domain "${{ inputs.sitemap_domain }}" \
            --sample "${{ inputs.sitemap_sample }}" \
            --types "${{ inputs.sitemap_types }}" 2>&1

      - name: "Phase 2 — Local deep scan (~5 min)"
        if: inputs.run_phase2
        continue-on-error: true
        env:
          AEO_DIR: site-snapshots/thegoodguys.com.au
          AEO_LABEL: TGG (local deep scan)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_aeo_local.py 2>&1

      - name: "Phase 2 — Results"
        if: inputs.run_phase2 && always()
        run: |
          if ls seo/outputs/aeo/aeo-local-*.json 1>/dev/null 2>&1; then
            python3 - <<'EOF'
          import json, glob
          files = sorted(glob.glob('seo/outputs/aeo/aeo-local-*.json'))
          data = json.loads(open(files[-1]).read())
          r = data.get('report', {})
          g = {'A':'🟢','B':'🟢','C':'🟡','D':'🟠','F':'🔴'}
          grade = r.get('grade','?')
          print(f"Local deep scan: {g.get(grade,'?')} Grade {grade} ({r.get('percentage',0)}%)")
          for k, c in r.get('categories', {}).items():
              bar = '█' * round(c['percentage']/5) + '░' * (20-round(c['percentage']/5))
              print(f"  {c['name']:<22} {bar} {c['score']}/{c['maxScore']} ({c['percentage']}%)")
          EOF
          fi

      # ── Phase 3: Ecommerce-specific AEO checks ──────────────────────────────
      - name: "Phase 3 — Ecommerce AEO checks (~10 min)"
        if: inputs.run_phase3
        continue-on-error: true
        env:
          SNAPSHOT_DIR: site-snapshots/thegoodguys.com.au
          AEO_LABEL: TGG (ecommerce)
          # Default covers 4 page types: home, category, sub-category, buying guide.
          # Buying guide is intentionally included to surface Cloudflare bot rules.
          LIVE_URLS: >-
            ${{ inputs.live_urls != '' && inputs.live_urls ||
              '["https://www.thegoodguys.com.au",
                "https://www.thegoodguys.com.au/televisions",
                "https://www.thegoodguys.com.au/televisions/smart-tvs",
                "https://www.thegoodguys.com.au/buying-guide/best-tvs"]' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_ecommerce_aeo.py 2>&1

      - name: "Phase 3 — Results"
        if: inputs.run_phase3 && always()
        run: |
          if ls seo/outputs/aeo/ecommerce-aeo-*.json 1>/dev/null 2>&1; then
            python3 - <<'EOF'
          import json, glob
          files = sorted(glob.glob('seo/outputs/aeo/ecommerce-aeo-*.json'))
          data = json.loads(open(files[-1]).read())
          g = {'A':'🟢','B':'🟢','C':'🟡','D':'🟠','F':'🔴'}
          grade = data.get('grade','?')
          pct = data.get('percentage',0)
          print(f"Ecommerce AEO: {g.get(grade,'?')} Grade {grade} ({pct}%)")
          check_names = {
              'schema':            'Schema / Structured Data',
              'schema_validity':   'Schema Validity',
              'render_diff':       'Render Diff',
              'user_agents':       'User Agent Behaviour',
              'hidden_content':    'Hidden Content',
              'ai_signals':        'AI Content Signals',
              'dom_structure':     'DOM Structure',
              'robots_content':    'Robots.txt & llms.txt',
              'sitemap_coverage':  'Sitemap Coverage',
              'competitor_schema': 'Competitor Schema',
              'au_signals':        'AU Content Signals',
          }
          for key, name in check_names.items():
              c = data.get('checks', {}).get(key, {})
              if not c:
                  continue
              if 'error' in c:
                  print(f"  ✗ {name:<28} {c['error'][:50]}")
              else:
                  bar = '█' * round(c.get('percentage',0)/5) + '░' * (20-round(c.get('percentage',0)/5))
                  print(f"  {name:<28} {bar} {c.get('score',0)}/{c.get('maxScore',0)} ({c.get('percentage',0)}%)")
          EOF
          fi

      # ── Phase 3b: Generate recommendations ─────────────────────────────────────
      - name: "Phase 3b — Generate recommendations"
        if: inputs.run_phase3 && always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_recommendations.py 2>&1

      # ── Phase 4: Content Intelligence ──────────────────────────────────────────
      - name: "Phase 4 — Content intelligence (~5 min)"
        if: inputs.run_phase2
        continue-on-error: true
        env:
          SNAPSHOT_DIR: site-snapshots/thegoodguys.com.au
          AEO_LABEL: TGG (content intelligence)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_content_aeo.py 2>&1

      - name: "Phase 4 — Results"
        if: inputs.run_phase2 && always()
        run: |
          if ls seo/outputs/aeo/content-aeo-*.json 1>/dev/null 2>&1; then
            python3 - <<'EOF'
          import json, glob
          files = sorted(glob.glob('seo/outputs/aeo/content-aeo-*.json'))
          data = json.loads(open(files[-1]).read())
          g = {'A':'🟢','B':'🟢','C':'🟡','D':'🟠','F':'🔴'}
          grade = data.get('grade','?')
          print(f"Content AEO: {g.get(grade,'?')} Grade {grade} ({data.get('percentage',0)}%)")
          for key, name in [
              ('boilerplate_ratio',  'Boilerplate Ratio'),
              ('content_chunking',   'Content Chunking'),
              ('entity_signals',     'Entity Signals'),
              ('knowledge_graph',    'Knowledge Graph'),
              ('semantic_structure', 'Semantic Structure'),
              ('anchor_quality',     'Anchor Text Quality'),
              ('content_similarity', 'Content Similarity'),
          ]:
              c = data.get('checks', {}).get(key, {})
              if 'error' in c:
                  print(f"  ✗ {name:<25} {c['error'][:50]}")
              else:
                  bar = '█' * round(c.get('percentage',0)/5) + '░' * (20-round(c.get('percentage',0)/5))
                  print(f"  {name:<25} {bar} {c.get('score',0)}/{c.get('maxScore',0)} ({c.get('percentage',0)}%)")
          EOF
          fi

      # ── Report ───────────────────────────────────────────────────────────────
      - name: "Generate HTML report"
        if: always()
        continue-on-error: true
        env:
          AEO_OUTPUT_DIR: seo/outputs/aeo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_aeo_report.py 2>&1

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload AEO results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aeo-results-${{ github.run_id }}
          path: seo/outputs/aeo/
          retention-days: 90
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Upload site snapshots
        if: inputs.run_phase2 && always()
        uses: actions/upload-artifact@v4
        with:
          name: site-snapshots-${{ github.run_id }}
          path: site-snapshots/
          retention-days: 7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
