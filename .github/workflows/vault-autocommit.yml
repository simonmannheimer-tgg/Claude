name: Vault Autocommit

# Snapshots changes inside vault/ once per day so Logseq edits made in the
# browser (via File System Access API + manual save) aren't lost. Manual
# trigger also supported. No Anthropic API needed.

on:
  schedule:
    - cron: '15 13 * * *'   # 13:15 UTC (≈ midnight Melbourne local)
  workflow_dispatch:

jobs:
  autocommit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit any vault changes
        run: |
          git config user.name "vault-autocommit[bot]"
          git config user.email "vault-autocommit@users.noreply.github.com"
          if [ -z "$(git status --porcelain vault/)" ]; then
            echo "No vault changes — nothing to commit."
            exit 0
          fi
          git add vault/
          git commit -m "chore(vault): nightly autocommit $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
