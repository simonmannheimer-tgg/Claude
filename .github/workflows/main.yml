name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Install dependencies
        run: pip install mcp pydantic-settings httpx uvicorn starlette
      - name: Check imports
        env:
          GTMETRIX_API_KEY: ci-test-key
        run: python -c "import server_http; import main; import run_audit_ci; import trigger_audit"
