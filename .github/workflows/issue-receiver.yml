name: Issue Receiver (@claude)

# Lightweight webhook — no ANTHROPIC_API_KEY required.
# When an issue containing @claude is opened or commented on:
#   1. Labels it "claude-pending"
#   2. Posts an acknowledgement comment
# The Claude Code session loop-daemon picks it up and processes it.
# If no session is running, Simon sees the "claude-pending" label and
# runs /check-github manually.

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  acknowledge:
    # Only fire for @claude mentions from real users (not bots)
    if: |
      (
        github.event_name == 'issues' &&
        contains(github.event.issue.body, '@claude') &&
        github.event.issue.user.type != 'Bot'
      ) ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        github.event.comment.user.type != 'Bot' &&
        github.event.comment.user.login != 'github-actions[bot]'
      )

    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Add claude-pending label
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;

            // Ensure label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'claude-pending',
                color: '7057ff',
                description: 'Queued for Claude Code processing'
              });
            } catch (e) {
              // Label already exists — fine
            }

            // Apply label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['claude-pending']
            });

            // Acknowledge
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: [
                '**Task queued for Claude Code.** ⏳',
                '',
                'The SEO agent team will pick this up in the next polling cycle.',
                'If processing takes more than a minute, run `/check-github` in your Claude Code session.',
                '',
                '_— GitHub Actions_'
              ].join('\n')
            });
