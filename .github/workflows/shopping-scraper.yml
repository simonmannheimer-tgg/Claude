name: Google Shopping Scraper

on:
  workflow_dispatch:
    inputs:
      scraper:
        description: "Which scraper to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - organic
          - carousel
      mode:
        description: "Browser mode"
        required: true
        default: "desktop"
        type: choice
        options:
          - desktop
          - mobile
      keywords:
        description: "Comma-separated keywords (leave blank for defaults)"
        required: false
        default: ""

  schedule:
    - cron: "0 7 * * 1"  # Every Monday 07:00 UTC (17:00 AEST)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # ──────────────────────────────────────────────────────────────────────
      # CAROUSEL SCRAPER
      # ──────────────────────────────────────────────────────────────────────
      - name: Run carousel scraper
        if: ${{ github.event_name == 'schedule' || github.event.inputs.scraper == 'carousel' || github.event.inputs.scraper == 'both' }}
        env:
          KEYWORDS: ${{ github.event.inputs.keywords }}
          MODE: ${{ github.event.inputs.mode || 'desktop' }}
        run: |
          python - <<'PYEOF'
          import asyncio, csv, re, os
          from datetime import datetime
          from pathlib import Path
          from playwright.async_api import async_playwright

          raw_kw = os.environ.get("KEYWORDS", "")
          KEYWORDS = [k.strip() for k in raw_kw.split(",") if k.strip()] or [
              "fridge", "vacuum", "television", "tv", "washer", "washing machine"
          ]
          MODE = os.environ.get("MODE", "desktop")
          RESULTS_DIR = Path("results")
          SCREENSHOTS_DIR = Path("screenshots")
          HEADERS = ["keyword","position","title","price","rating","reviews","store","store_domain","mode","scraped_at"]

          MOBILE_UA  = "Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36"
          DESKTOP_UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
          MOBILE_VP  = {"width": 390,  "height": 844}
          DESKTOP_VP = {"width": 1280, "height": 900}

          PRICE_RE = re.compile(r'A?\$[\d,]+(?:\.\d{2})?')

          def clean(s): return re.sub(r"\s+", " ", s or "").strip()
          def domain(url):
              m = re.search(r"https?://(?:www\.)?([^/?#]+)", url or "")
              return m.group(1) if m else ""

          async def dismiss_consent(page):
              for sel in ["button#L2AGLb","button:has-text('Accept all')","button:has-text('I agree')","button:has-text('Agree')"]:
                  try:
                      btn = page.locator(sel)
                      if await btn.count() > 0:
                          await btn.first.click(); await page.wait_for_timeout(800); return
                  except: pass

          async def slow_scroll(page):
              """Scroll gradually to trigger lazy-loaded carousels."""
              height = await page.evaluate("document.body.scrollHeight")
              step = 600
              for y in range(0, height, step):
                  await page.evaluate(f"window.scrollTo(0, {y})")
                  await page.wait_for_timeout(300)
              await page.evaluate("window.scrollTo(0, 0)")
              await page.wait_for_timeout(500)

          EXTRACT_JS = r"""
          () => {
              const priceRe  = /A?\$[\d,]+(?:\.\d{2})?/;
              const ratingRe = /^(\d\.\d)\b/;
              const results  = [];

              // ── find candidate product card containers ────────────────────
              const CARD_SELS = [
                  '.sh-dlr__list-result',
                  '.mnr-c',
                  '[data-docid]',
                  '.sh-dgr__content',
                  '.KZmu8e',
                  '.Irmie',
              ];
              let cards = [];
              for (const sel of CARD_SELS) {
                  const found = Array.from(document.querySelectorAll(sel));
                  cards.push(...found);
              }

              // Fallback: any small-ish block with a price and multiple lines
              if (cards.length === 0) {
                  document.querySelectorAll('div,li').forEach(el => {
                      const t = el.innerText || '';
                      if (priceRe.test(t) && t.length < 500 && t.split('\n').filter(Boolean).length >= 2)
                          cards.push(el);
                  });
              }

              // ── deduplicate cards: prefer deepest element for each rect ──
              const rectKey = el => {
                  try { const r = el.getBoundingClientRect(); return `${Math.round(r.top)},${Math.round(r.left)}`; }
                  catch { return null; }
              };
              const byRect = new Map();
              for (const el of cards) {
                  const k = rectKey(el);
                  if (!k) continue;
                  // keep the deepest (most-specific) element at this position
                  const existing = byRect.get(k);
                  if (!existing || el.contains(existing)) byRect.set(k, el);
              }
              cards = Array.from(byRect.values());

              // ── extract data from each card ───────────────────────────────
              const seenKey = new Set();
              let pos = 0;

              for (const el of cards) {
                  const lines = (el.innerText || '')
                      .split('\n')
                      .map(l => l.trim())
                      .filter(Boolean);

                  if (lines.length < 2) continue;

                  // price
                  const priceLine = lines.find(l => priceRe.test(l));
                  if (!priceLine) continue;
                  const price = priceLine.match(priceRe)[0];

                  // title: longest line before the price that isn't a price itself
                  const priceIdx = lines.indexOf(priceLine);
                  const beforePrice = lines.slice(0, priceIdx).filter(l => !priceRe.test(l));
                  const title = beforePrice.sort((a,b) => b.length - a.length)[0] || '';
                  if (!title) continue;

                  // deduplicate by title+price
                  const key = title + '||' + price;
                  if (seenKey.has(key)) continue;
                  seenKey.add(key);

                  // rating: first line matching x.x pattern
                  let rating = '', reviews = '';
                  for (const l of lines) {
                      if (!rating && ratingRe.test(l)) { rating = l.match(ratingRe)[1]; continue; }
                      // reviews: parenthesised number like (1,234) or plain number after rating found
                      if (rating && !reviews && /^\(?([\d,]+)\)?$/.test(l)) {
                          reviews = l.replace(/[(),]/g, '');
                      }
                  }

                  // store: DOM selectors first, then text heuristic
                  const storeEl = el.querySelector(
                      '[data-merchant-name],.aULzUe,.E5ocAb,.LbUacb,.IuHnof,.NJMzre,.zPEcBd,.Lq5OHe'
                  );
                  let store = (
                      storeEl?.getAttribute('data-merchant-name') ||
                      storeEl?.innerText || ''
                  ).replace(/^from\s+/i,'').trim();

                  if (!store) {
                      // last line after price that isn't a number or price
                      const after = lines.slice(priceIdx + 1);
                      store = after.find(l =>
                          !priceRe.test(l) &&
                          !/^[\d.,()]+$/.test(l) &&
                          l.length > 1
                      ) || '';
                  }

                  // store domain from outbound link
                  let storeUrl = '';
                  for (const a of el.querySelectorAll('a[href]')) {
                      const h = a.href || '';
                      if (h && !h.includes('google.') && h.startsWith('http')) { storeUrl = h; break; }
                  }
                  // also try redirect URLs like /url?q=https://...
                  if (!storeUrl) {
                      for (const a of el.querySelectorAll('a[href]')) {
                          const m = (a.getAttribute('href')||'').match(/[?&]q=(https?[^&]+)/);
                          if (m) { storeUrl = decodeURIComponent(m[1]); break; }
                      }
                  }

                  pos++;
                  results.push({ pos, title, price, rating, reviews, store, storeUrl });
              }

              return results;
          }
          """

          async def extract(page, keyword):
              raw = await page.evaluate(EXTRACT_JS)
              now = datetime.now().isoformat(timespec="seconds")
              rows = []
              for r in raw:
                  store = clean(r.get("store",""))
                  sd = domain(r.get("storeUrl",""))
                  rows.append({
                      "keyword": keyword,
                      "position": r["pos"],
                      "title": clean(r["title"]),
                      "price": clean(r["price"]),
                      "rating": r["rating"],
                      "reviews": r["reviews"],
                      "store": store or sd,
                      "store_domain": sd,
                      "mode": MODE,
                      "scraped_at": now,
                  })
              return rows

          def save_csv(rows, path):
              path.parent.mkdir(exist_ok=True)
              with open(path,"w",newline="",encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=HEADERS)
                  w.writeheader(); w.writerows(rows)

          async def main():
              all_rows = []
              is_mobile = MODE == "mobile"
              async with async_playwright() as pw:
                  browser = await pw.chromium.launch(headless=True, args=["--no-sandbox","--disable-blink-features=AutomationControlled"])
                  ctx = await browser.new_context(
                      viewport=MOBILE_VP if is_mobile else DESKTOP_VP,
                      user_agent=MOBILE_UA if is_mobile else DESKTOP_UA,
                      locale="en-AU", is_mobile=is_mobile, has_touch=is_mobile,
                  )
                  await ctx.add_init_script("Object.defineProperty(navigator,'webdriver',{get:()=>undefined})")
                  for kw in KEYWORDS:
                      page = await ctx.new_page()
                      slug = kw.replace(" ","_")
                      try:
                          await page.goto(
                              f"https://www.google.com.au/search?q={kw.replace(' ','+')}&gl=au&hl=en-AU&num=10",
                              wait_until="domcontentloaded", timeout=30000
                          )
                          await dismiss_consent(page)
                          await page.wait_for_timeout(2000)
                          await slow_scroll(page)
                          SCREENSHOTS_DIR.mkdir(exist_ok=True)
                          await page.screenshot(path=str(SCREENSHOTS_DIR/f"{MODE}_{slug}.png"), full_page=True)
                          rows = await extract(page, kw)
                          all_rows.extend(rows)
                          save_csv(rows, RESULTS_DIR/f"{slug}.csv")
                          print(f"carousel [{MODE}] {kw!r}: {len(rows)} products")
                          for r in rows: print(f"  #{r['position']} {r['title'][:50]} | {r['price']} | {r['store']}")
                      except Exception as e: print(f"ERROR {kw}: {e}")
                      finally: await page.close()
                      await asyncio.sleep(2)
                  await browser.close()
              save_csv(all_rows, RESULTS_DIR/"all_results.csv")
              print(f"\nCarousel total: {len(all_rows)} products")

          asyncio.run(main())
          PYEOF

      # ──────────────────────────────────────────────────────────────────────
      # ORGANIC SCRAPER
      # ──────────────────────────────────────────────────────────────────────
      - name: Run organic scraper
        if: ${{ github.event_name == 'schedule' || github.event.inputs.scraper == 'organic' || github.event.inputs.scraper == 'both' }}
        env:
          KEYWORDS: ${{ github.event.inputs.keywords }}
          MODE: ${{ github.event.inputs.mode || 'desktop' }}
        run: |
          python - <<'PYEOF'
          import asyncio, csv, re, os
          from datetime import datetime
          from pathlib import Path
          from playwright.async_api import async_playwright

          raw_kw = os.environ.get("KEYWORDS", "")
          KEYWORDS = [k.strip() for k in raw_kw.split(",") if k.strip()] or [
              "fridge", "vacuum", "television", "tv", "washer", "washing machine"
          ]
          MODE = os.environ.get("MODE", "desktop")
          RESULTS_DIR = Path("results")
          SCREENSHOTS_DIR = Path("screenshots")
          HEADERS = ["keyword","position","title","price","rating","reviews","store","store_domain","url","mode","scraped_at"]

          MOBILE_UA  = "Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Mobile Safari/537.36"
          DESKTOP_UA = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
          MOBILE_VP  = {"width": 390,  "height": 844}
          DESKTOP_VP = {"width": 1280, "height": 900}

          def clean(s): return re.sub(r"\s+", " ", s or "").strip()
          def domain(url):
              m = re.search(r"https?://(?:www\.)?([^/?#]+)", url or "")
              return m.group(1) if m else ""

          async def dismiss_consent(page):
              for sel in ["button#L2AGLb","button:has-text('Accept all')","button:has-text('I agree')","button:has-text('Agree')"]:
                  try:
                      btn = page.locator(sel)
                      if await btn.count() > 0:
                          await btn.first.click(); await page.wait_for_timeout(800); return
                  except: pass

          async def slow_scroll(page):
              height = await page.evaluate("document.body.scrollHeight")
              for y in range(0, height, 600):
                  await page.evaluate(f"window.scrollTo(0, {y})")
                  await page.wait_for_timeout(300)
              await page.evaluate("window.scrollTo(0, 0)")
              await page.wait_for_timeout(500)

          EXTRACT_JS = r"""
          () => {
              const priceRe  = /A?\$[\d,]+(?:\.\d{2})?/;
              const ratingRe = /^(\d\.\d)\b/;
              const results  = [];

              const CARD_SELS = [
                  '.sh-dgr__content',
                  '.sh-pr__product-results-grid .KZmu8e',
                  '.sh-dlr__list-result',
                  '[data-docid]',
                  'li.sh-osd__offer-row',
                  '.Irmie',
              ];
              let cards = [];
              for (const sel of CARD_SELS) {
                  cards.push(...Array.from(document.querySelectorAll(sel)));
              }
              if (cards.length === 0) {
                  document.querySelectorAll('div,li').forEach(el => {
                      const t = el.innerText || '';
                      if (priceRe.test(t) && t.length < 500 && t.split('\n').filter(Boolean).length >= 2)
                          cards.push(el);
                  });
              }

              // deduplicate by position rect, keeping deepest element
              const byRect = new Map();
              for (const el of cards) {
                  try {
                      const r = el.getBoundingClientRect();
                      const k = `${Math.round(r.top)},${Math.round(r.left)}`;
                      const existing = byRect.get(k);
                      if (!existing || el.contains(existing)) byRect.set(k, el);
                  } catch {}
              }
              cards = Array.from(byRect.values());

              const seenKey = new Set();
              let pos = 0;

              for (const el of cards) {
                  // skip sponsored
                  const sponsored =
                      el.querySelector('[aria-label*="Sponsored"],.nNzjpf-cS4Vcb-PvZLI-S,.Krfl3e,[data-dtld]') !== null ||
                      /^sponsored$/im.test(((el.innerText||'').split('\n')[0]||''));
                  if (sponsored) continue;

                  const lines = (el.innerText || '')
                      .split('\n').map(l => l.trim()).filter(Boolean);
                  if (lines.length < 2) continue;

                  const priceLine = lines.find(l => priceRe.test(l));
                  if (!priceLine) continue;
                  const price = priceLine.match(priceRe)[0];

                  const priceIdx = lines.indexOf(priceLine);
                  const beforePrice = lines.slice(0, priceIdx).filter(l => !priceRe.test(l));
                  const title = beforePrice.sort((a,b) => b.length - a.length)[0] || '';
                  if (!title) continue;

                  const key = title + '||' + price;
                  if (seenKey.has(key)) continue;
                  seenKey.add(key);

                  let rating = '', reviews = '';
                  for (const l of lines) {
                      if (!rating && ratingRe.test(l)) { rating = l.match(ratingRe)[1]; continue; }
                      if (rating && !reviews && /^\(?([\d,]+)\)?$/.test(l)) {
                          reviews = l.replace(/[(),]/g,'');
                      }
                  }

                  const storeEl = el.querySelector(
                      '[data-merchant-name],.aULzUe,.E5ocAb,.LbUacb,.IuHnof,.NJMzre,.zPEcBd,.Lq5OHe'
                  );
                  let store = (
                      storeEl?.getAttribute('data-merchant-name') ||
                      storeEl?.innerText || ''
                  ).replace(/^from\s+/i,'').trim();
                  if (!store) {
                      const after = lines.slice(priceIdx + 1);
                      store = after.find(l => !priceRe.test(l) && !/^[\d.,()]+$/.test(l) && l.length > 1) || '';
                  }

                  // product URL
                  const linkEl = el.querySelector('a[href*="/shopping/product/"],a.shntl,a[href]');
                  const href = linkEl?.getAttribute('href') || '';
                  const url = href.startsWith('http') ? href : (href ? 'https://www.google.com' + href : '');

                  // store domain
                  let storeUrl = '';
                  for (const a of el.querySelectorAll('a[href]')) {
                      const h = a.href || '';
                      if (h && !h.includes('google.') && h.startsWith('http')) { storeUrl = h; break; }
                  }
                  if (!storeUrl) {
                      for (const a of el.querySelectorAll('a[href]')) {
                          const m = (a.getAttribute('href')||'').match(/[?&]q=(https?[^&]+)/);
                          if (m) { storeUrl = decodeURIComponent(m[1]); break; }
                      }
                  }

                  pos++;
                  results.push({ pos, title, price, rating, reviews, store, storeUrl, url });
              }

              return results;
          }
          """

          async def extract(page, keyword):
              raw = await page.evaluate(EXTRACT_JS)
              now = datetime.now().isoformat(timespec="seconds")
              rows = []
              for r in raw:
                  store = clean(r.get("store",""))
                  sd = domain(r.get("storeUrl",""))
                  rows.append({
                      "keyword": keyword,
                      "position": r["pos"],
                      "title": clean(r["title"]),
                      "price": clean(r["price"]),
                      "rating": r["rating"],
                      "reviews": r["reviews"],
                      "store": store or sd,
                      "store_domain": sd,
                      "url": r.get("url",""),
                      "mode": MODE,
                      "scraped_at": now,
                  })
              return rows

          def save_csv(rows, path):
              path.parent.mkdir(exist_ok=True)
              with open(path,"w",newline="",encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=HEADERS)
                  w.writeheader(); w.writerows(rows)

          async def main():
              all_rows = []
              is_mobile = MODE == "mobile"
              async with async_playwright() as pw:
                  browser = await pw.chromium.launch(headless=True, args=["--no-sandbox","--disable-blink-features=AutomationControlled"])
                  ctx = await browser.new_context(
                      viewport=MOBILE_VP if is_mobile else DESKTOP_VP,
                      user_agent=MOBILE_UA if is_mobile else DESKTOP_UA,
                      locale="en-AU", is_mobile=is_mobile, has_touch=is_mobile,
                  )
                  await ctx.add_init_script("Object.defineProperty(navigator,'webdriver',{get:()=>undefined})")
                  for kw in KEYWORDS:
                      page = await ctx.new_page()
                      slug = kw.replace(" ","_")
                      try:
                          await page.goto(
                              f"https://www.google.com.au/search?q={kw.replace(' ','+')}&tbm=shop&gl=au&hl=en-AU&num=40",
                              wait_until="domcontentloaded", timeout=30000
                          )
                          await dismiss_consent(page)
                          await page.wait_for_timeout(2000)
                          await slow_scroll(page)
                          SCREENSHOTS_DIR.mkdir(exist_ok=True)
                          await page.screenshot(path=str(SCREENSHOTS_DIR/f"organic_{MODE}_{slug}.png"), full_page=True)
                          rows = await extract(page, kw)
                          all_rows.extend(rows)
                          save_csv(rows, RESULTS_DIR/f"organic_{slug}.csv")
                          print(f"organic [{MODE}] {kw!r}: {len(rows)} products")
                          for r in rows: print(f"  #{r['position']} {r['title'][:50]} | {r['price']} | {r['store']}")
                      except Exception as e: print(f"ERROR {kw}: {e}")
                      finally: await page.close()
                      await asyncio.sleep(2)
                  await browser.close()
              save_csv(all_rows, RESULTS_DIR/"organic_all.csv")
              print(f"\nOrganic total: {len(all_rows)} products")

          asyncio.run(main())
          PYEOF

      # ──────────────────────────────────────────────────────────────────────
      # UPLOAD & SUMMARY
      # ──────────────────────────────────────────────────────────────────────
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: shopping-results-${{ github.run_id }}
          path: |
            results/
            screenshots/
          retention-days: 30

      - name: Print summary
        run: |
          echo "## Shopping Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ github.event.inputs.mode || 'desktop' }} | **Region:** Australia (google.com.au)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in results/all_results.csv results/organic_all.csv; do
            if [ -f "$f" ]; then
              echo "### $f" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              head -50 "$f" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
