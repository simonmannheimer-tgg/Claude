name: Google Shopping Scraper

on:
  workflow_dispatch:
    inputs:
      scraper:
        description: "Which scraper to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - organic
          - carousel
      keywords:
        description: "Comma-separated keywords (leave blank for defaults)"
        required: false
        default: ""
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Override keywords (if provided)
        if: ${{ github.event.inputs.keywords != '' }}
        run: |
          python - <<'EOF'
          import re, pathlib

          new_kws = [k.strip() for k in "${{ github.event.inputs.keywords }}".split(",") if k.strip()]
          new_list = "[\n" + "".join(f'    "{k}",\n' for k in new_kws) + "]"

          for fname in ["shopping_scraper.py", "organic_shopping_scraper.py"]:
              path = pathlib.Path(fname)
              src = path.read_text()
              src = re.sub(r"KEYWORDS\s*=\s*\[.*?\]", f"KEYWORDS = {new_list}", src, flags=re.DOTALL)
              path.write_text(src)

          print(f"Keywords set to: {new_kws}")
          EOF

      - name: Run carousel scraper
        if: ${{ github.event_name == 'schedule' || github.event.inputs.scraper == 'carousel' || github.event.inputs.scraper == 'both' }}
        run: python shopping_scraper.py

      - name: Run organic scraper
        if: ${{ github.event_name == 'schedule' || github.event.inputs.scraper == 'organic' || github.event.inputs.scraper == 'both' }}
        run: python organic_shopping_scraper.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: shopping-results-${{ github.run_id }}
          path: |
            results/
            screenshots/
          retention-days: 30

      - name: Print summary
        run: |
          echo "## Shopping Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in results/all_results.csv results/organic_all.csv; do
            if [ -f "$f" ]; then
              echo "### $f" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              cat "$f" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done
