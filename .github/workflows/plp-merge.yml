name: PLP Merge

# Lightweight webhook — no API keys required.
# Fires whenever a plp-batch-*.md file is pushed to seo/outputs/.
# Runs the merge script (stdlib only — no pip/uv needed) and commits
# the updated CSV back to the same branch.

on:
  push:
    paths:
      - 'seo/outputs/plp-batch-*.md'

jobs:
  merge-to-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Run merge script
        run: python3 seo/scripts/merge-plp-outputs.py

      - name: Commit CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seo/outputs/plp-all-batches-*.csv
          git diff --cached --quiet || git commit -m "chore(plp): regenerate merged CSV from batch .md files [skip ci]"
          git push
